<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="言語聴覚士のための絵カード呼称トレーニングアプリ" />
  <meta name="theme-color" content="#2563eb" />
  <!-- iOS / iPad ホーム画面追加対応 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ST絵カード" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" type="image/png" href="images/app/kotoba-card-icon.png" />
  <link rel="apple-touch-icon" href="images/app/kotoba-card-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>ST絵カード呼称トレーニング</title>
  <!--
    Critical CSS: style.css の読み込みに失敗しても最低限「1画面ずつ表示」
    「hidden要素は非表示」だけは効かせる保険 (SW更新中や iOS Safari 特有の
    FOUC で style.css が反映されないケースへの graceful degradation)
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    [hidden] { display: none !important; }
    .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
    .screen.is-active { display: flex; }
  </style>
  <link rel="stylesheet" href="style.css" onerror="document.documentElement.dataset.cssFailed='1'" />
</head>
<body>
  <main id="app">
    <!-- スタート画面 -->
    <section id="screen-start" class="screen is-active">
      <div class="start-inner">
        <h1 class="app-title">ST絵カード<br />呼称トレーニング</h1>
        <p class="app-subtitle">言語聴覚療法用 呼称訓練アプリ</p>
        <button id="btn-go-setup" class="btn btn-primary btn-large" type="button">はじめる</button>
      </div>
    </section>

    <!-- 設定画面 -->
    <section id="screen-setup" class="screen">
      <header class="screen-header">
        <button id="btn-setup-back" class="btn btn-ghost btn-icon" type="button" aria-label="ホームに戻る">←</button>
        <h2 class="screen-title">出題設定</h2>
        <div class="spacer"></div>
      </header>

      <div class="setup-body">
        <section class="setup-section">
          <h3 class="setup-section-title">カテゴリ <span class="hint">(複数選択可)</span></h3>
          <div class="cat-actions">
            <button class="btn btn-mini" type="button" data-cat-action="all">すべて選択</button>
            <button class="btn btn-mini" type="button" data-cat-action="core">基本のみ</button>
            <button class="btn btn-mini" type="button" data-cat-action="clear">クリア</button>
          </div>
          <div id="cat-list" class="checkbox-grid"></div>
        </section>

        <section class="setup-section">
          <h3 class="setup-section-title">
            問題数と出題割合
            <span class="hint">(親密度ごとに問題数を指定)</span>
          </h3>
          <div class="fam-actions">
            <button class="btn btn-mini" type="button" data-fam-preset="easy">やさしい中心</button>
            <button class="btn btn-mini" type="button" data-fam-preset="balanced">バランス</button>
            <button class="btn btn-mini" type="button" data-fam-preset="hard">むずかしめ</button>
            <button class="btn btn-mini" type="button" data-fam-preset="clear">クリア</button>
          </div>
          <div class="fam-slider-list">
            <div class="fam-slider" data-fam="high">
              <div class="fam-slider-header">
                <span class="fam-slider-name">やさしい <small>(高頻度)</small></span>
                <span class="fam-slider-readout">
                  <output id="count-high-value" class="fam-slider-value">5</output>
                  <span class="fam-slider-unit">問</span>
                  <small class="fam-slider-max">/ <span id="count-high-max">0</span>語</small>
                </span>
              </div>
              <input id="count-high" type="range" min="0" max="0" value="5" />
            </div>
            <div class="fam-slider" data-fam="mid">
              <div class="fam-slider-header">
                <span class="fam-slider-name">ふつう <small>(中頻度)</small></span>
                <span class="fam-slider-readout">
                  <output id="count-mid-value" class="fam-slider-value">3</output>
                  <span class="fam-slider-unit">問</span>
                  <small class="fam-slider-max">/ <span id="count-mid-max">0</span>語</small>
                </span>
              </div>
              <input id="count-mid" type="range" min="0" max="0" value="3" />
            </div>
            <div class="fam-slider" data-fam="low">
              <div class="fam-slider-header">
                <span class="fam-slider-name">むずかしい <small>(低頻度)</small></span>
                <span class="fam-slider-readout">
                  <output id="count-low-value" class="fam-slider-value">2</output>
                  <span class="fam-slider-unit">問</span>
                  <small class="fam-slider-max">/ <span id="count-low-max">0</span>語</small>
                </span>
              </div>
              <input id="count-low" type="range" min="0" max="0" value="2" />
            </div>
          </div>
          <div class="fam-slider-total">
            <span class="fam-slider-total-key">合計:</span>
            <span id="count-total-value" class="fam-slider-total-num">10</span>
            <span class="fam-slider-total-unit">問</span>
          </div>
        </section>

        <section class="setup-section">
          <h3 class="setup-section-title">出題順</h3>
          <label class="toggle">
            <input id="shuffle-toggle" type="checkbox" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">ランダムに出題する</span>
          </label>
        </section>

        <div class="setup-summary">
          <div id="setup-warning" class="warning" hidden></div>
        </div>
      </div>

      <footer class="screen-footer">
        <button id="btn-start" class="btn btn-primary btn-large" type="button">スタート</button>
      </footer>
    </section>

    <!-- 出題画面 -->
    <section id="screen-quiz" class="screen">
      <header class="screen-header">
        <button id="btn-quiz-quit" class="btn btn-ghost btn-icon" type="button" aria-label="中断">×</button>
        <div class="progress">
          <span id="progress-current">1</span>
          <span class="progress-sep">/</span>
          <span id="progress-total">10</span>
        </div>
        <div class="spacer"></div>
      </header>

      <div class="quiz-body">
        <div class="card-frame">
          <img id="card-image" alt="" />
        </div>

        <div id="answer-area" class="answer-area" hidden>
          <div id="answer-label" class="answer-label"></div>
          <button id="btn-replay" class="btn btn-secondary" type="button">
            <span class="btn-icon-inline">🔊</span> もう一度再生
          </button>
        </div>
      </div>

      <footer class="screen-footer quiz-footer">
        <button id="btn-hint" class="btn btn-secondary btn-large" type="button">
          <span class="btn-icon-inline">💡</span> ヒント
        </button>
        <button id="btn-show-answer" class="btn btn-primary btn-large" type="button">答えを見る</button>
        <button id="btn-next" class="btn btn-primary btn-large" type="button" hidden>次へ</button>
      </footer>
    </section>

    <!-- 終了画面 -->
    <section id="screen-end" class="screen">
      <div class="end-inner">
        <div class="end-emoji" aria-hidden="true">🎉</div>
        <h2 class="end-title">お疲れさまでした</h2>
        <p class="end-sub"><span id="end-count">0</span>問完了しました</p>
        <div class="end-buttons">
          <button id="btn-again" class="btn btn-primary btn-large" type="button">もう一度</button>
          <button id="btn-home" class="btn btn-ghost btn-large" type="button">ホームに戻る</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
